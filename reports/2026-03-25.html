<title>収益物件レポート - 2026-03-25</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic Pro',sans-serif;background:#f0f2f5;color:#1a1a2e}
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);color:white;padding:24px 32px}
.header-title{font-size:20px;font-weight:700;letter-spacing:.05em}
.header-date{font-size:13px;opacity:.6;margin-top:2px}
.header-stats{display:flex;gap:24px;margin-top:16px}
.stat{text-align:center}
.stat-num{font-size:28px;font-weight:700;color:#4fc3f7}
.stat-label{font-size:11px;opacity:.6;margin-top:2px}
.rank-summary{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;align-items:center}
.rank-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}
.rank-badge.rank-Aplus{background:#ff6b35;color:white}
.rank-badge.rank-A{background:#f7c59f;color:#7a3b00}
.rank-badge.rank-Bplus{background:#4a90d9;color:white}
.rank-badge.rank-B{background:#7eb8e8;color:white}
.rank-badge.rank-NG{background:#555;color:#aaa}
.history-nav{margin-top:16px;border-top:1px solid rgba(255,255,255,.1);padding-top:14px}
.history-label{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.08em;margin-bottom:8px}
.history-days{display:flex;gap:8px;flex-wrap:wrap}
.day-chip{padding:6px 12px;border-radius:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);cursor:pointer;transition:all .2s;text-decoration:none}
.day-chip:hover{background:rgba(255,255,255,.18)}
.day-chip.active{background:#4fc3f7;border-color:#4fc3f7}
.day-chip-date{font-size:11px;color:rgba(255,255,255,.7)}
.day-chip.active .day-chip-date{color:#1a1a2e}
.day-chip-count{font-size:13px;font-weight:700;color:white;margin-top:1px}
.day-chip.active .day-chip-count{color:#1a1a2e}
.day-chip-count.zero{color:rgba(255,255,255,.3);font-weight:400;font-size:11px}
.filter-bar{background:white;padding:12px 32px;display:flex;gap:12px;align-items:center;border-bottom:1px solid #e0e0e0;flex-wrap:wrap}
.filter-label{font-size:12px;color:#888;font-weight:600}
.filter-btn{padding:6px 14px;border:1px solid #ddd;border-radius:20px;background:white;font-size:12px;cursor:pointer;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:#1a1a2e;color:white;border-color:#1a1a2e}
.sort-select{margin-left:auto;padding:6px 12px;border:1px solid #ddd;border-radius:6px;font-size:12px;cursor:pointer}
.count-label{font-size:12px;color:#888;margin-left:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;padding:24px 32px}
.card{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.14)}
.card-img{position:relative;width:100%;aspect-ratio:4/3;overflow:hidden;background:#111}
.card-img img{width:100%;height:100%;object-fit:contain;display:block;cursor:zoom-in;transition:transform .25s}
.card-img-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:40px}
.img-slider{position:relative;width:100%;aspect-ratio:4/3;overflow:hidden;background:#111}
.img-slides{display:flex;width:100%;height:100%;transition:transform .3s ease}
.img-slides img{min-width:100%;width:100%;height:100%;object-fit:contain;flex-shrink:0;cursor:zoom-in;transition:transform .25s}
.img-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.4);color:white;border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;z-index:10;line-height:1}
.img-btn.prev{left:6px}
.img-btn.next{right:6px}
.img-dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
.img-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer}
.img-dot.active{background:white}
@media(hover:hover){.img-slides img:hover,.card-img img:hover{transform:scale(1.06)}}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;flex-direction:column;align-items:center;justify-content:center}.lightbox.open{display:flex}
.lb-img{max-width:95vw;max-height:82vh;object-fit:contain;border-radius:6px;user-select:none;-webkit-user-drag:none}
.lb-close{position:fixed;top:14px;right:18px;color:white;font-size:34px;cursor:pointer;line-height:1;z-index:10001;padding:4px 10px}
.lb-nav{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.18);color:white;border:none;width:52px;height:52px;border-radius:50%;cursor:pointer;font-size:28px;display:flex;align-items:center;justify-content:center;z-index:10001}
.lb-nav.prev{left:10px}.lb-nav.next{right:10px}
.lb-counter{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.65);font-size:13px;z-index:10001}
.rank-tag{position:absolute;top:12px;left:12px;padding:4px 10px;border-radius:6px;font-size:13px;font-weight:800}
.rank-tag.Aplus{background:#ff6b35;color:white}
.rank-tag.A{background:#f7c59f;color:#7a3b00}
.rank-tag.Bplus{background:#4a90d9;color:white}
.rank-tag.B{background:#7eb8e8;color:white}
.rank-tag.NG{background:rgba(0,0,0,.6);color:#ccc}
.basement-tag{position:absolute;top:12px;right:12px;background:rgba(80,160,80,.9);color:white;font-size:10px;padding:3px 7px;border-radius:4px;font-weight:600}
.card-body{padding:14px 16px}
.card-address{font-size:11px;color:#888;margin-bottom:2px}
.card-location{font-size:16px;font-weight:700;color:#1a1a2e}
.card-price{font-size:22px;font-weight:800;color:#1a1a2e;margin-top:6px}
.card-price-sub{font-size:11px;color:#888;font-weight:400}
.card-info{display:flex;gap:16px;margin-top:8px}
.card-info-item{font-size:12px;color:#555}
.card-info-item span{display:block;font-size:10px;color:#aaa;margin-bottom:1px}
.divider{height:1px;background:#f0f0f0;margin:10px 0}
.land-detail{display:grid;grid-template-columns:1fr 1fr;gap:6px;background:#f8f9fa;border-radius:8px;padding:10px;margin-top:8px}
.land-detail-item .lbl{font-size:10px;color:#aaa}
.land-detail-item .val{font-size:12px;font-weight:600;color:#1a1a2e}
.land-detail-item .val.missing{color:#ccc;font-weight:400;font-style:italic}
.land-detail-item .val.estimated{color:#E67E22}
.plan-title{font-size:10px;font-weight:700;color:#888;letter-spacing:.08em;margin-bottom:8px}
.plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.plan-item .lbl{font-size:10px;color:#aaa}
.plan-item .val{font-size:13px;font-weight:600;color:#1a1a2e}
.plan-item .val.yield{color:#e74c3c;font-size:16px;font-weight:800}
.plan-item .val.good{color:#27ae60}
.far-bar{margin-top:8px}
.far-bar-label{display:flex;justify-content:space-between;font-size:10px;color:#aaa;margin-bottom:3px}
.far-bar-track{height:5px;background:#f0f0f0;border-radius:3px}
.far-bar-fill{height:5px;border-radius:3px;background:linear-gradient(90deg,#4fc3f7,#1976d2)}
.card-footer{padding:10px 16px;background:#fafafa;border-top:1px solid #f0f0f0;display:flex;gap:8px}
.btn{flex:1;padding:8px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;border:none;transition:background .2s}
.btn-primary{background:#1a1a2e;color:white}
.btn-primary:hover{background:#2d2d4e}
.btn-secondary{background:white;color:#1a1a2e;border:1px solid #ddd}
.btn-secondary:hover{background:#f5f5f5}
.ng-reason{font-size:11px;color:#999;background:#f5f5f5;padding:3px 8px;border-radius:4px;margin-top:6px;display:inline-block}
@media(max-width:600px){
  .header{padding:16px}
  .grid{padding:16px;grid-template-columns:1fr}
  .filter-bar{padding:10px 16px}
}
</style>

mgs/p5fa339758ebd.jpg", "../imgs/p793953ca5998.jpg", "../imgs/p9c09d9547443.jpg"], "use_zone": "第一種中高層住居専用地域", "front_direction": "南東", "road_width": 3.6, "height_district": "第二種高度地区", "height_district_estimated": true, "shadow_reg": "あり", "shadow_reg_estimated": true, "best_structure": "重量鉄骨", "best_yield": 2.74, "floors_str": "地上3F＋半地下 / 12戸", "has_basement": true, "construction_cost": 26219, "total_cost": 103219, "annual_rent": 2832, "far_used": 154.1, "effective_far": 160, "consumed_bcr": 55.9, "max_bcr": 70, "disqualified": true, "disqualify_reason": null}];</script>

<div class="lightbox" id="lightbox" onclick="if(event.target.id==='lightbox')closeLb()">
  <span class="lb-close" onclick="closeLb()">&#x2715;</span>
  <button class="lb-nav prev" onclick="lbNav(-1)">&#8249;</button>
  <img class="lb-img" id="lb-img" src="" alt="">
  <button class="lb-nav next" onclick="lbNav(1)">&#8250;</button>
  <div class="lb-counter" id="lb-counter"></div>
</div>

<div class="header">
  <div>
    <a href="../index.html" style="color:rgba(255,255,255,.45);font-size:11px;text-decoration:none;display:block;margin-bottom:6px">← 最新の結果へ</a><div class="header-title">収益物件レポート</div>
    <div class="header-date">2026年3月25日（水）</div>
  </div>
  <div class="header-stats">

    <div class="stat"><div class="stat-num">3</div><div class="stat-label">有望物件（B以上）</div></div>
    <div class="stat"><div class="stat-num">6.8%</div><div class="stat-label">最高利回り</div></div>
  </div>
  <div class="rank-summary"><span class="rank-badge rank-Bplus">B+ 1件</span>
<span class="rank-badge rank-B">B 2件</span>

</div>

<div class="filter-bar">
  <span class="filter-label">ランク</span>
  <button class="filter-btn active" onclick="filterRank('all',this)">すべて</button>
  <button class="filter-btn" onclick="filterRank('bplus',this)">B+以上</button>
  <button class="filter-btn" onclick="filterRank('b',this)">B</button>
  <button class="filter-btn" onclick="filterRank('ng',this)">NG含む</button>
  <span class="count-label" id="count-label"></span>
  <select class="sort-select" onchange="sortCards(this.value)">
    <option value="rank">ランク順</option>
    <option value="yield">利回り順</option>
    <option value="price_asc">価格 安い順</option>
    <option value="price_desc">価格 高い順</option>
  </select>
</div>

<div class="grid" id="grid"></div>

<script>
const RANK_ORDER = {"A+":0,"A":1,"B+":2,"B":3,"B-":4,"C+":5,"C":6,"D+":7,"D":8,"NG":9};

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function fman(v){return v>=10000?(v/10000).toFixed(1)+"億円":v.toLocaleString()+"万円";}
function rankCls(r){return{["A+"]:"Aplus",A:"A","B+":"Bplus",B:"B","B-":"B"}[r]||"NG";}

function buildCard(p){
  const rc = rankCls(p.rank);
  let imgHtml;
  if(p.imgs && p.imgs.length > 1){
    const uid = "sl"+Math.random().toString(36).slice(2,8);
    const imgsJson = JSON.stringify(p.imgs).replace(/'/g,"&#39;");
    const slides = p.imgs.map((src,i)=>`<img src="${esc(src)}" loading="lazy" onclick="lbFromSlider('${uid}',${i})">`).join("");
    const dots = p.imgs.map((_,i)=>`<span class="img-dot${i===0?' active':''}" onclick="slideTo('${uid}', ${i})"></span>`).join("");
    imgHtml = `<div class="img-slider" id="${uid}" data-imgs='${imgsJson}'>
      <div class="img-slides" id="${uid}_slides">${slides}</div>
      <button class="img-btn prev" onclick="slide('${uid}',-1)">&#8249;</button>
      <button class="img-btn next" onclick="slide('${uid}',1)">&#8250;</button>
      <div class="img-dots" id="${uid}_dots">${dots}</div>
    </div>`;
  } else if(p.imgs && p.imgs.length === 1){
    imgHtml = `<img src="${esc(p.imgs[0])}" loading="lazy" onclick="openLb(p.imgs,0)" onerror="this.parentNode.innerHTML='<div class=card-img-fallback>&#x1F3D7;</div>'">`;
  } else {
    imgHtml = `<div class="card-img-fallback">&#x1F3D7;</div>`;
  }

  // 土地情報
  const hdEst = p.height_district_estimated;
  const hdHtml = p.height_district
    ? `<div class="val${hdEst?" estimated":""}">` + esc(p.height_district) + `</div>`
    : `<div class="val missing">未取得</div>`;
  const srEst = p.shadow_reg_estimated;
  const srHtml = p.shadow_reg
    ? `<div class="val${srEst?" estimated":""}">` + esc(p.shadow_reg) + `</div>`
    : `<div class="val missing">—</div>`;
  let road = "";
  if(p.front_direction && /[\d.]+\s*m/.test(p.front_direction)) road = p.front_direction;
  else if(p.front_direction && p.road_width) road = p.front_direction+" "+p.road_width.toFixed(1)+"m";
  else if(p.front_direction) road = p.front_direction;
  else if(p.road_width) road = p.road_width.toFixed(1)+"m";
  const roadHtml = road ? `<div class="val">${esc(road)}</div>` : `<div class="val missing">未取得</div>`;

  // 想定プラン
  let planHtml = "";
  if(p.best_structure && p.best_yield > 0){
    const farPct = p.effective_far>0 ? Math.round(p.far_used/p.effective_far*100) : 0;
    const bcrPct = p.max_bcr>0 ? Math.round(p.consumed_bcr/p.max_bcr*100) : 0;
    const baseBadge = p.has_basement ? ` <span style="background:#4caf50;color:white;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;">半地下あり</span>` : "";
    planHtml = `
    <div class="divider"></div>
    <div class="plan-title">想定プラン${baseBadge}</div>
    <div class="plan-grid">
      <div class="plan-item"><div class="lbl">構造</div><div class="val">${esc(p.best_structure)}</div></div>
      <div class="plan-item"><div class="lbl">表面利回り</div><div class="val yield">${p.best_yield.toFixed(1)}%</div></div>
      <div class="plan-item"><div class="lbl">規模</div><div class="val">${esc(p.floors_str)}</div></div>
      <div class="plan-item"><div class="lbl">建築費概算</div><div class="val">${fman(p.construction_cost)}</div></div>
      <div class="plan-item"><div class="lbl">総投資額</div><div class="val">${fman(p.total_cost)}</div></div>
      <div class="plan-item"><div class="lbl">年間賃料</div><div class="val good">約${fman(p.annual_rent)}</div></div>
    </div>
    ${p.effective_far>0?`<div class="far-bar"><div class="far-bar-label"><span>容積率消化 ${p.far_used}% / ${p.effective_far}%</span><span>${farPct}%</span></div><div class="far-bar-track"><div class="far-bar-fill" style="width:${Math.min(farPct,100)}%"></div></div></div>`:""}
    ${p.max_bcr>0?`<div class="far-bar"><div class="far-bar-label"><span>建蔽率消化 ${p.consumed_bcr}% / ${p.max_bcr}%</span><span>${bcrPct}%</span></div><div class="far-bar-track"><div class="far-bar-fill" style="width:${Math.min(bcrPct,100)}%;background:linear-gradient(90deg,#81c784,#388e3c)"></div></div></div>`:""}`;
  } else if(p.disqualified){
    planHtml = `<div class="divider"></div><div class="ng-reason">NG: ${esc(p.disqualify_reason||p.rank)}</div>`;
  }

  const wrapOpen = (p.imgs&&p.imgs.length>1) ? `` : `<div class="card-img">`;
  const wrapClose = (p.imgs&&p.imgs.length>1) ? `` : `</div>`;
  const overlayInner = `<span class="rank-tag ${rc}">${p.rank==="A+"?"★":""}${esc(p.rank)}</span>${p.has_basement?'<span class="basement-tag">半地下あり</span>':""}`;
  // スライダーの場合はimg-sliderの中にオーバーレイを注入
  const finalImgHtml = (p.imgs&&p.imgs.length>1)
    ? imgHtml.replace('</div>', overlayInner+'</div>')
    : imgHtml;

  return `<div class="card" data-rank="${esc(p.rank)}" data-yield="${p.best_yield}" data-price="${p.price_man}">
  ${wrapOpen}
    ${finalImgHtml}
    ${(p.imgs&&p.imgs.length<=1)?overlayInner:""}
  ${wrapClose}
  <div class="card-body">
    <div class="card-address">東京都${esc(p.ward)}</div>
    <div class="card-location">${esc(p.address)}</div>
    <div class="card-price">${fman(p.price_man)} <span class="card-price-sub">${p.tsubo_unit>0?"（坪"+p.tsubo_unit.toLocaleString()+"万）":""}</span></div>
    <div class="card-info">
      <div class="card-info-item"><span>面積</span>${p.area_sqm.toFixed(1)}㎡（${p.tsubo.toFixed(1)}坪）</div>
      ${p.stations&&p.stations.length?`<div class="card-info-item"><span>最寄り駅</span>${p.stations.map(s=>esc(s.name)+(s.walk?" 徒歩"+s.walk+"分":"")).join(" / ")}</div>`:""}
    </div>
    <div class="land-detail">
      <div class="land-detail-item"><div class="lbl">用途地域</div><div class="val">${esc(p.use_zone)||'<span class="missing">未取得</span>'}</div></div>
      <div class="land-detail-item"><div class="lbl">前面道路</div>${roadHtml}</div>
      <div class="land-detail-item"><div class="lbl">高度地区</div>${hdHtml}</div>
      <div class="land-detail-item"><div class="lbl">日影規制</div>${srHtml}</div>
    </div>
    ${planHtml}
  </div>
  <div class="card-footer">
    ${p.url?`<a class="btn btn-secondary" href="${esc(p.url)}" target="_blank">物件を見る</a>`:`<span class="btn btn-secondary" style="opacity:.4;pointer-events:none">物件情報なし</span>`}
    ${p.tool_url?`<a class="btn btn-primary" href="${esc(p.tool_url)}" target="_blank">マンションツールで試算</a>`:""}
  </div>
</div>`;
}

function renderAll(){
  const sorted=[...DATA].sort((a,b)=>(RANK_ORDER[a.rank]??9)-(RANK_ORDER[b.rank]??9)||b.best_yield-a.best_yield);
  document.getElementById("grid").innerHTML=sorted.map(buildCard).join("");
  updateCount();
}

function filterRank(f,btn){
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  if(btn)btn.classList.add("active");
  document.querySelectorAll(".card").forEach(card=>{
    const r=card.dataset.rank;
    let show=false;
    if(f==="all") show=true;
    else if(f==="bplus") show=["A+","A","B+"].includes(r);
    else if(f==="b") show=["B","B-"].includes(r);
    else if(f==="ng") show=true;
    card.style.display=show?"":"none";
  });
  updateCount();
}

function sortCards(by){
  const grid=document.getElementById("grid");
  const cards=[...grid.querySelectorAll(".card")];
  cards.sort((a,b)=>{
    if(by==="rank") return (RANK_ORDER[a.dataset.rank]??9)-(RANK_ORDER[b.dataset.rank]??9)||parseFloat(b.dataset.yield)-parseFloat(a.dataset.yield);
    if(by==="yield") return parseFloat(b.dataset.yield)-parseFloat(a.dataset.yield);
    if(by==="price_asc") return parseFloat(a.dataset.price)-parseFloat(b.dataset.price);
    if(by==="price_desc") return parseFloat(b.dataset.price)-parseFloat(a.dataset.price);
  });
  cards.forEach(c=>grid.appendChild(c));
}

function updateCount(){
  const all=document.querySelectorAll(".card");
  const vis=[...all].filter(c=>c.style.display!=="none").length;
  document.getElementById("count-label").textContent=`${vis}件表示 / 全${all.length}件`;
}

function slide(uid, dir){
  const el = document.getElementById(uid);
  if(!el) return;
  const slides = el.querySelectorAll(".img-slides img");
  const dots = el.querySelectorAll(".img-dot");
  let cur = parseInt(el.dataset.idx||0);
  cur = (cur + dir + slides.length) % slides.length;
  el.dataset.idx = cur;
  el.querySelector(".img-slides").style.transform = `translateX(-${cur*100}%)`;
  dots.forEach((d,i)=>d.classList.toggle("active",i===cur));
}
function slideTo(uid, idx){
  const el = document.getElementById(uid);
  if(!el) return;
  const slides = el.querySelectorAll(".img-slides img");
  const dots = el.querySelectorAll(".img-dot");
  el.dataset.idx = idx;
  el.querySelector(".img-slides").style.transform = `translateX(-${idx*100}%)`;
  dots.forEach((d,i)=>d.classList.toggle("active",i===idx));
}

// ── ライトボックス ──────────────────────────────
let _lbI=[], _lbC=0;
function openLb(imgs,idx){
  _lbI=imgs; _lbC=idx||0;
  document.getElementById("lb-img").src=imgs[_lbC];
  document.getElementById("lb-counter").textContent=imgs.length>1?(_lbC+1)+"/"+imgs.length:"";
  document.querySelector(".lb-nav.prev").style.display=imgs.length<2?"none":"";
  document.querySelector(".lb-nav.next").style.display=imgs.length<2?"none":"";
  document.getElementById("lightbox").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeLb(){document.getElementById("lightbox").classList.remove("open");document.body.style.overflow="";}
function lbNav(d){_lbC=(_lbC+d+_lbI.length)%_lbI.length;document.getElementById("lb-img").src=_lbI[_lbC];document.getElementById("lb-counter").textContent=(_lbC+1)+"/"+_lbI.length;}
function lbFromSlider(uid,idx){const el=document.getElementById(uid);if(!el)return;const imgs=JSON.parse(el.dataset.imgs||"[]");openLb(imgs,idx);}
document.addEventListener("keydown",e=>{if(!document.getElementById("lightbox").classList.contains("open"))return;if(e.key==="Escape")closeLb();if(e.key==="ArrowLeft")lbNav(-1);if(e.key==="ArrowRight")lbNav(1);});
// ライトボックス スワイプ（スマホ）
(()=>{let tx=0;const lb=document.getElementById("lightbox");lb.addEventListener("touchstart",e=>{tx=e.changedTouches[0].clientX;},{passive:true});lb.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>40)lbNav(dx<0?1:-1);},{passive:true});})();

// ── スライダー タッチスワイプ & タップでライトボックス ──
function initSwipes(){
  document.querySelectorAll(".img-slider:not([data-sw])").forEach(el=>{
    el.dataset.sw="1";
    let tx=0, ty=0;
    el.addEventListener("touchstart",e=>{tx=e.changedTouches[0].clientX;ty=e.changedTouches[0].clientY;},{passive:true});
    el.addEventListener("touchend",e=>{
      const dx=e.changedTouches[0].clientX-tx;
      const dy=e.changedTouches[0].clientY-ty;
      if(Math.abs(dx)>40&&Math.abs(dx)>Math.abs(dy)){
        slide(el.id,dx<0?1:-1);
      } else if(Math.abs(dx)<10&&Math.abs(dy)<10){
        // タップ → ライトボックスを開く
        const cur=parseInt(el.dataset.idx||0);
        lbFromSlider(el.id,cur);
      }
    },{passive:true});
  });
}
// カード単体画像のタップでライトボックス
document.addEventListener("touchend",function(e){
  const img=e.target;
  if(img.tagName==="IMG"&&img.closest(".card-img")&&!img.closest(".img-slider")){
    const t=e.changedTouches[0];
    if(Math.abs(t.clientX-(img._tx||t.clientX))<10)openLb([img.src],0);
  }
  if(img.tagName==="IMG"&&img.closest(".card-img"))img._tx=undefined;
},{passive:true});
document.addEventListener("touchstart",function(e){
  const img=e.target;
  if(img.tagName==="IMG")img._tx=e.changedTouches[0].clientX;
},{passive:true});

renderAll();
initSwipes();
</script>

<script>
(function(){
  const container = document.getElementById('dynChips');
  if (!container) return;
  const DAYS = ['日','月','火','水','木','金','土'];
  const currentDate = location.pathname.split('/').pop().replace('.html','');
  const today = new Date();
  today.setHours(0,0,0,0);
  function buildChips(hist) {
    container.innerHTML = '';
    for (let i = 0; i < 7; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() - i);
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      const dateStr = y+'-'+m+'-'+day;
      const label = (d.getMonth()+1)+'/'+d.getDate()+'（'+DAYS[d.getDay()]+'）';
      const isActive = dateStr === currentDate;
      const href = i === 0 ? '../index.html' : dateStr+'.html';
      const info = hist ? hist[dateStr] : null;
      const count = info && info.total > 0 ? info.total : 0;
      const txt = count > 0 ? count+'件' : '—';
      const zero = count === 0 ? ' zero' : '';
      const a = document.createElement('a');
      a.className = 'day-chip' + (isActive ? ' active' : '');
      a.href = href;
      a.innerHTML = '<div class="day-chip-date">'+label+'</div><div class="day-chip-count'+zero+'">'+txt+'</div>';
      container.appendChild(a);
    }
  }
  buildChips(null);
  fetch('history.json?v='+Date.now()).then(function(r){ return r.json(); }).then(function(hist){ buildChips(hist); }).catch(function(){});
})();
</script>
